<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BEXS AI 管理團隊會議</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#0d0d14;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}
#sidebar{width:250px;background:#12121e;border-right:1px solid #1e1e30;display:flex;flex-direction:column;flex-shrink:0}
#sb-head{padding:20px 16px 14px;border-bottom:1px solid #1e1e30}
#sb-head h2{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:2px;font-weight:600}
#sb-head .company{font-size:18px;color:#d4a837;font-weight:700;margin-top:6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;transition:background .15s}
.sb-item:hover{background:#1a1a2e}
.sb-av{width:38px;height:38px;border-radius:50%;border:2px solid #333;flex-shrink:0;object-fit:cover}
.sb-item.speaking .sb-av{border-color:#d4a837;box-shadow:0 0 10px rgba(212,168,55,.4)}
.sb-name{font-size:13px;font-weight:600;color:#e8e8e8}
.sb-role{font-size:11px;color:#777;margin-top:1px}
.sb-dot{width:8px;height:8px;border-radius:50%;background:#32c864;margin-left:auto;flex-shrink:0;box-shadow:0 0 6px #32c86466}
#conn-dot{width:8px;height:8px;border-radius:50%;margin-left:8px;display:inline-block}
#conn-dot.connected{background:#32c864;box-shadow:0 0 6px #32c86466}
#conn-dot.disconnected{background:#e03040;box-shadow:0 0 6px #e0304066}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#header{height:56px;background:#12121e;border-bottom:1px solid #1e1e30;display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
#header h1{font-size:16px;font-weight:700;color:#fff}
#live{background:#e03040;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;letter-spacing:1px;animation:pulse 2s infinite}
#live.ended{background:#555;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#dt{margin-left:auto;font-size:12px;color:#666}
#chat{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:2px}
.msg{display:flex;gap:12px;padding:10px 12px;border-radius:8px;transition:background .15s;animation:fadeIn .3s ease}
.msg:hover{background:#15152240}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ma{width:40px;height:40px;border-radius:50%;flex-shrink:0;object-fit:cover;margin-top:2px}
.mb{flex:1;min-width:0}
.mh{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.mn{font-size:13px;font-weight:700}
.mt{font-size:11px;color:#555}
.mx{font-size:14px;line-height:1.7;color:#d0d0d0}
.mx strong{color:#fff}
.mx em{color:#d4a837;font-style:normal}
.mx table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.mx th{text-align:left;padding:6px 10px;color:#999;border-bottom:1px solid #2a2a3e;font-weight:600}
.mx td{padding:6px 10px;border-bottom:1px solid #1a1a2e}
.mx ul,.mx ol{margin:6px 0 6px 20px}.mx li{margin:3px 0}
.cr{color:#d4a837}.cv{color:#4696e6}.cd{color:#c864dc}.ce{color:#32c8a0}.cso{color:#f08250}.cm{color:#dc5050}.coo{color:#64b4f0}
.divider{text-align:center;color:#444;font-size:12px;padding:16px 0;letter-spacing:1px}
.action-box{background:#1a1a2e;border-left:3px solid #d4a837;padding:14px 18px;border-radius:0 8px 8px 0;margin:12px 0;animation:fadeIn .3s ease}
.action-box h4{color:#d4a837;font-size:13px;margin-bottom:8px}
.action-box ul{margin-left:18px;font-size:13px;line-height:1.8}
#waiting{text-align:center;color:#555;padding:60px 20px;font-size:14px}
#waiting .spinner{width:30px;height:30px;border:3px solid #333;border-top-color:#d4a837;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
@media(max-width:768px){#sidebar{display:none}#header h1{font-size:14px}}
</style>
</head>
<body>
<div id="sidebar"><div id="sb-head"><h2>BEXS 總部</h2><div class="company">AI 管理團隊</div></div><div id="sb-list"></div></div>
<div id="main">
  <div id="header">
    <h1 id="meeting-title">BEXS AI 管理團隊會議</h1>
    <span id="live">● LIVE</span>
    <span id="conn-dot" class="disconnected" title="連線狀態"></span>
    <span id="dt"></span>
  </div>
  <div id="chat">
    <div id="waiting"><div class="spinner"></div>等待會議開始⋯⋯<br><small>會議內容將即時顯示在這裡</small></div>
  </div>
</div>

var tMap = {};
team.forEach(function(t) { tMap[t.id] = t; });

// Build sidebar
var sb = document.getElementById("sb-list");
team.forEach(function(t) {
  var d = document.createElement("div");
  d.className = "sb-item";
  d.id = "sb-" + t.id;
  d.innerHTML = '<img class="sb-av" src="' + AVATARS[t.id] + '"><div><span class="sb-name">' + t.name + '</span><div class="sb-role">' + t.role + '</div></div><span class="sb-dot"></span>';
  sb.appendChild(d);
});

// Render functions
function renderMessage(msg) {
  var chat = document.getElementById("chat");
  // Remove waiting indicator
  var w = document.getElementById("waiting");
  if (w) w.remove();

  if (msg.type === "divider") {
    var d = document.createElement("div");
    d.className = "divider";
    d.textContent = "—— " + msg.text + " ——";
    chat.appendChild(d);
  } else if (msg.type === "action") {
    var d = document.createElement("div");
    d.className = "action-box";
    var li = (msg.items || []).map(function(i) { return "<li>" + i + "</li>"; }).join("");
    d.innerHTML = "<h4>" + (msg.title || "") + "</h4><ul>" + li + "</ul>";
    chat.appendChild(d);
  } else {
    // message
    var t = tMap[msg.speaker] || tMap["rachel"];
    var d = document.createElement("div");
    d.className = "msg";
    var ts = msg.ts ? new Date(msg.ts) : new Date();
    var timeStr = String(ts.getHours()).padStart(2, "0") + ":" + String(ts.getMinutes()).padStart(2, "0");
    d.innerHTML = '<img class="ma" src="' + AVATARS[msg.speaker || "rachel"] + '"><div class="mb"><div class="mh"><span class="mn ' + t.cls + '">' + t.name + '</span><span class="mt">' + timeStr + '</span></div><div class="mx">' + (msg.html || "") + '</div></div>';
    chat.appendChild(d);
    // Highlight speaker in sidebar
    document.querySelectorAll(".sb-item").forEach(function(el) { el.classList.remove("speaking"); });
    var sbEl = document.getElementById("sb-" + (msg.speaker || "rachel"));
    if (sbEl) sbEl.classList.add("speaking");
  }
  chat.scrollTop = chat.scrollHeight;
}

function updateMeta(meta) {
  if (meta.title) document.getElementById("meeting-title").textContent = meta.title;
  if (meta.date || meta.day) {
    document.getElementById("dt").textContent = (meta.day || "") + " — " + (meta.date || "");
  }
  var live = document.getElementById("live");
  if (meta.status === "ended") {
    live.textContent = "● 已結束";
    live.classList.add("ended");
  } else {
    live.textContent = "● LIVE";
    live.classList.remove("ended");
  }
}

// SSE Connection
function connectSSE() {
  var dot = document.getElementById("conn-dot");
  var es = new EventSource("/stream");

  es.onopen = function() {
    dot.className = "connected";
    dot.title = "已連線";
  };

  es.onmessage = function(e) {
    var data = JSON.parse(e.data);

    if (data.type === "init") {
      // Full state sync
      updateMeta(data.meta);
      var chat = document.getElementById("chat");
      chat.innerHTML = "";
      if (data.messages.length === 0) {
        chat.innerHTML = '<div id="waiting"><div class="spinner"></div>等待會議開始⋯⋯<br><small>會議內容將即時顯示在這裡</small></div>';
      } else {
        data.messages.forEach(renderMessage);
      }
    } else if (data.type === "new_message") {
      renderMessage(data.message);
    } else if (data.type === "meta_update") {
      updateMeta(data.meta);
    } else if (data.type === "clear") {
      var chat = document.getElementById("chat");
      chat.innerHTML = '<div id="waiting"><div class="spinner"></div>等待會議開始⋯⋯<br><small>會議內容將即時顯示在這裡</small></div>';
    }
  };

  es.onerror = function() {
    dot.className = "disconnected";
    dot.title = "連線中斷，重新連線中⋯";
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

connectSSE();
